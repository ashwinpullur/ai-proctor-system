<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Proctor – Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
    .results-screen { min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:3rem 2rem; }
    .results-card {
        max-width:720px; width:100%;
        background:rgba(17,24,39,0.75); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
        border:1px solid rgba(255,255,255,0.08); border-radius:28px; padding:3rem 2.5rem;
        box-shadow:0 30px 80px rgba(0,0,0,0.55); animation:fadeUp .5s ease;
    }
    .result-badge { display:inline-flex; align-items:center; gap:.5rem; padding:.5rem 1.25rem; border-radius:40px; font-size:.85rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:1.5rem; }
    .result-badge.pass   { background:rgba(16,185,129,.12); color:#10b981; border:1px solid rgba(16,185,129,.25); }
    .result-badge.fail   { background:rgba(244,63,94,.12);  color:#f43f5e; border:1px solid rgba(244,63,94,.25);  }
    .result-badge.review { background:rgba(245,158,11,.12); color:#f59e0b; border:1px solid rgba(245,158,11,.25); }

    .results-card h1 { font-size:1.8rem; font-weight:800; letter-spacing:-.04em; margin-bottom:.4rem; }
    .results-card .sub { color:#64748b; font-size:.9rem; margin-bottom:2.5rem; }

    .score-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:2.5rem; }
    .score-box { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:1.4rem 1rem; text-align:center; }
    .score-box .sv   { font-size:2.25rem; font-weight:800; letter-spacing:-.03em; margin-bottom:.3rem; }
    .score-box .sl   { font-size:.72rem; color:#64748b; font-weight:600; text-transform:uppercase; letter-spacing:.07em; }

    .evidence-preview { display:flex; gap:.75rem; flex-wrap:wrap; margin-bottom:2rem; }
    .ev-thumb { width:100px; height:72px; object-fit:cover; border-radius:10px; border:1px solid rgba(255,255,255,0.08); cursor:pointer; transition:transform .2s; }
    .ev-thumb:hover { transform:scale(1.05); }

    .lms-box { background:rgba(99,102,241,.08); border:1px solid rgba(99,102,241,.2); border-radius:16px; padding:1.5rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:2rem; flex-wrap:wrap; }
    .lms-label { font-size:.9rem; color:#a5b4fc; font-weight:600; }
    .lms-sub   { font-size:.78rem; color:#64748b; margin-top:.25rem; }
    .submit-lms-btn { background:#6366f1; color:#fff; border:none; padding:.85rem 1.75rem; border-radius:12px; font-size:.9rem; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s; white-space:nowrap; }
    .submit-lms-btn:hover { background:#4f46e5; transform:translateY(-1px); }
    .submit-lms-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

    .back-btn { display:block; text-align:center; color:#64748b; font-size:.85rem; text-decoration:none; transition:color .2s; margin-top:.5rem; }
    .back-btn:hover { color:#94a3b8; }
    </style>
</head>
<body>
<div class="results-screen">
    <div class="results-card">
        <div id="result-badge" class="result-badge review">⏳ Loading results...</div>
        <h1 id="result-title">Exam Results</h1>
        <p class="sub" id="result-sub">Calculating your score...</p>

        <div class="score-row">
            <div class="score-box"><div class="sv text-success" id="res-score">—</div><div class="sl">Score</div></div>
            <div class="score-box"><div class="sv danger-text"   id="res-warn">—</div><div class="sl">Warnings</div></div>
            <div class="score-box"><div class="sv text-warning"  id="res-ev">—</div><div class="sl">Evidence</div></div>
            <div class="score-box"><div class="sv text-secondary" id="res-verdict">—</div><div class="sl">Integrity</div></div>
        </div>

        <!-- Evidence thumbnails -->
        <h3 style="font-size:.875rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem;">Evidence Captures</h3>
        <div class="evidence-preview" id="ev-preview">
            <span style="color:#475569;font-size:.85rem;">No evidence captured.</span>
        </div>

        <!-- LMS Submission -->
        <div class="lms-box">
            <div>
                <div class="lms-label">📤 Submit to LMS / Admin</div>
                <div class="lms-sub" id="lms-status">Ready to submit your exam report.</div>
            </div>
            <button class="submit-lms-btn" id="lmsBtn" onclick="submitToLMS()">Submit Report</button>
        </div>

        <a href="/" class="back-btn">← Back to Exam Portal</a>
    </div>
</div>

<!-- Lightbox -->
<div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:2rem;" onclick="this.style.display='none'">
    <img id="lb-img" src="" style="max-width:90vw;max-height:80vh;border-radius:12px;border:1px solid rgba(255,255,255,.1);">
</div>

<script>
const studentName = "{{ session.get('username', 'Student') }}";
const examScore   = parseInt(sessionStorage.getItem('examScore') || '0');

document.getElementById('result-title').textContent = `Results — ${studentName}`;

fetch('/api/summary').then(r => r.json()).then(data => {
    // Score
    const scorePct = Math.round((examScore / 10) * 100);
    document.getElementById('res-score').textContent = `${examScore}/10 (${scorePct}%)`;
    document.getElementById('res-warn').textContent  = data.total_warnings;
    document.getElementById('res-ev').textContent    = data.total_evidence;

    // Verdict
    const v = data.verdict;
    document.getElementById('res-verdict').textContent = v === 'pass' ? 'Clean' : v === 'fail' ? 'Flagged' : 'Review';
    document.getElementById('res-verdict').className = v === 'pass' ? 'sv text-success' : v === 'fail' ? 'sv danger-text' : 'sv text-warning';

    // Badge
    const badge = document.getElementById('result-badge');
    if (v === 'pass')        { badge.textContent = '✅ Pass'; badge.className = 'result-badge pass'; document.getElementById('result-sub').textContent = 'Exam completed with no integrity issues.'; }
    else if (v === 'fail')   { badge.textContent = '🚫 Integrity Fail'; badge.className = 'result-badge fail'; document.getElementById('result-sub').textContent = 'Critical violations were detected during your exam.'; }
    else                     { badge.textContent = '🔍 Under Review'; badge.className = 'result-badge review'; document.getElementById('result-sub').textContent = 'Your exam may require manual review.'; }

    // Evidence thumbnails
    const evEl = document.getElementById('ev-preview');
    if ((data.evidence||[]).length > 0) {
        evEl.innerHTML = data.evidence.map(item =>
            `<img class="ev-thumb" src="/static/evidence/${item.file}" title="${item.msg}"
             onclick="showLightbox('/static/evidence/${item.file}')">`
        ).join('');
    }
}).catch(() => {});

function submitToLMS() {
    document.getElementById('lmsBtn').disabled = true;
    fetch('/api/submit', { method:'POST' }).then(() => {
        document.getElementById('lms-status').textContent = '✅ Report submitted to admin successfully.';
        document.getElementById('lmsBtn').textContent = 'Submitted ✓';
    }).catch(() => {
        document.getElementById('lms-status').textContent = 'Submission failed. Please try again.';
        document.getElementById('lmsBtn').disabled = false;
    });
}

function showLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lb-img').src = src;
    lb.style.display = 'flex';
}
</script>
</body>
</html>
