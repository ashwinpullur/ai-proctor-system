<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreHunt | Admin Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='fluent.css') }}">
    <style>
        body { background-color: var(--ms-off-white); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .signup-card { 
            width: 100%; max-width: 440px; padding: 2.75rem; 
            background: var(--ms-white); border: 1px solid var(--ms-grey-border); 
            box-shadow: 0 2px 4px rgba(0,0,0,.14);
        }
        .ms-logo-small { margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 1.1rem; }
        h2 { font-size: 1.5rem; margin-bottom: 1rem; color: #1b1b1b; }
        .error-msg { color: var(--ms-danger); font-size: 0.9rem; margin-bottom: 1rem; }
        .info-box { background: #f0f7ff; color: #0078d4; padding: 1rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="ms-logo-small">
            <div class="ms-symbol-tiny" style="background: var(--ms-blue); width: 16px; height: 16px; border-radius: 2px; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800;">SH</div>
            <span>ScoreHunt Admin</span>
        </div>
        <h2>Admin Setup</h2>
        <p style="margin-bottom: 1.5rem; font-size: 0.95rem;">Configure ScoreHunt Admin Center</p>

        <div class="info-box">
            <span>🛡️</span>
            <span>This account will grant access to all exam logs, student statistics, and evidence files. Ensure you use a strong password.</span>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" class="ms-input" placeholder="Admin Username" required autofocus>
            <input type="password" name="password" class="ms-input" placeholder="Admin Password" required>
            <div style="margin-top: 1.5rem;">
                <button type="submit" class="ms-btn ms-btn-primary" style="width: 100%;">Create Admin Account</button>
            </div>
        </form>

        <div class="footer-links">
            Already have an account? <a href="/admin/login">Log in here</a>
        </div>
    </div>
</body>
</html>
