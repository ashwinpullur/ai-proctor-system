<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to Admin Center</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='fluent.css') }}">
    <style>
        body {
            background-color: var(--ms-off-white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 2.75rem;
            background: var(--ms-white);
            border: 1px solid var(--ms-grey-border);
            box-shadow: 0 2px 4px rgba(0,0,0,.14);
        }
        .ms-logo-small {
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .ms-symbol-tiny {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            width: 16px;
            height: 16px;
        }
        .ms-symbol-tiny div { width: 7px; height: 7px; }
        h2 { font-size: 1.5rem; margin-bottom: 1rem; color: #1b1b1b; }
        .error-msg { color: var(--ms-danger); font-size: 0.9rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="ms-logo-small">
            <div class="ms-symbol-tiny">
                <div class="ms-red"></div>
                <div class="ms-green"></div>
                <div class="ms-blue-box"></div>
                <div class="ms-yellow"></div>
            </div>
            <span>Admin Center</span>
        </div>
        <h2>Admin Sign in</h2>
        <p style="margin-bottom: 1.5rem; font-size: 0.95rem;">Please enter your administrative credentials</p>
        
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" class="ms-input" placeholder="Admin Username" required autofocus>
            <input type="password" name="password" class="ms-input" placeholder="Password" required>
            
            <div style="display: flex; justify-content: flex-end; margin-top: 1rem;">
                <button type="submit" class="ms-btn ms-btn-primary">Sign in</button>
            </div>
        </form>
    </div>
</body>
</html>
